<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kexo AI — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ===== DARK THEME (default) ===== */
        :root {
            --bg: #0f0f11;
            --bg2: #17171a;
            --bg3: #1e1e22;
            --surface: #22222a;
            --surface2: #2a2a35;
            --surface-hover: #2d2d3a;
            --border: rgba(255,255,255,0.08);
            --border2: rgba(255,255,255,0.14);
            --text: #f0eff4;
            --text2: #a09fad;
            --text3: #6b6a7a;
            --accent: #f5a623;
            --accent2: #ff6b35;
            --blue: #4f8ef7;
            --green: #2dd4a0;
            --rose: #f25f7a;
            --violet: #9b74f5;
            --shadow: 0 4px 24px rgba(0,0,0,0.5);
            --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);
            --radius: 12px;
        }

        /* ===== LIGHT THEME ===== */
        body.light-mode {
            --bg: #f4f4f8;
            --bg2: #ffffff;
            --bg3: #f0f0f5;
            --surface: #ffffff;
            --surface2: #f4f4f8;
            --surface-hover: #eeeef5;
            --border: rgba(0,0,0,0.08);
            --border2: rgba(0,0,0,0.14);
            --text: #12111a;
            --text2: #5a5970;
            --text3: #9090a8;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 48px rgba(0,0,0,0.12);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== HEADER ===== */
        .dash-header {
            height: 58px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            position: sticky; top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex; align-items: center; gap: 9px;
            text-decoration: none;
            flex-shrink: 0;
        }
        .brand-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            color: #000;
        }
        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .brand-name em { font-style: normal; color: var(--accent); }

        .header-sep {
            width: 1px; height: 20px;
            background: var(--border2);
        }
        .header-page {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--text3);
        }

        .header-right {
            margin-left: auto;
            display: flex; align-items: center; gap: 10px;
        }

        .btn-icon {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-icon:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

        .btn-back {
            display: flex; align-items: center; gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 7px 14px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
        }
        .btn-back:hover { background: var(--surface2); color: var(--text); }

        /* ===== LAYOUT ===== */
        .dash-body {
            max-width: 1120px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ===== TOP BAR ===== */
        .dash-topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 36px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .dash-topbar-left h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .dash-topbar-left p {
            font-size: 14px;
            color: var(--text3);
        }

        .btn-new {
            display: flex; align-items: center; gap: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #000;
            padding: 11px 22px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(245,166,35,0.3);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-new:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(245,166,35,0.4); }
        .btn-new:active { transform: scale(0.97); }

        .btn-import {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border2);
            color: var(--text2);
            padding: 10px 18px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-import:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

        /* ===== SEARCH BAR ===== */
        .dash-search {
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 14px;
            height: 42px;
            max-width: 400px;
            transition: border-color 0.2s;
        }
        .dash-search:focus-within { border-color: var(--accent); }
        .dash-search svg { color: var(--text3); flex-shrink: 0; }
        .dash-search input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
        }
        .dash-search input::placeholder { color: var(--text3); }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            border: 1px dashed var(--border2);
            border-radius: 16px;
            background: var(--bg2);
        }
        .empty-icon {
            width: 64px; height: 64px;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            color: var(--text3);
        }
        .empty-state h3 {
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        .empty-state p { font-size: 13px; color: var(--text3); margin-bottom: 24px; }

        /* ===== PROJECT GRID ===== */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .project-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .project-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            opacity: 0;
            transition: opacity 0.2s;
        }
        .project-card:hover {
            border-color: var(--border2);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .project-card:hover::before { opacity: 1; }

        .pc-top {
            display: flex; align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .pc-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, rgba(245,166,35,0.15), rgba(255,107,53,0.08));
            border: 1px solid rgba(245,166,35,0.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent);
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .pc-actions {
            display: flex; gap: 4px;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .project-card:hover .pc-actions { opacity: 1; }
        .pc-btn {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text3);
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .pc-btn:hover { background: var(--surface2); color: var(--text); }
        .pc-btn.danger:hover { background: rgba(242,95,122,0.1); color: var(--rose); border-color: rgba(242,95,122,0.3); }

        .pc-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pc-meta {
            font-size: 12px;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .pc-meta-item {
            display: flex; align-items: center; gap: 4px;
        }

        .pc-bottom {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .pc-open-btn {
            display: flex; align-items: center; gap: 6px;
            background: var(--accent);
            color: #000;
            padding: 6px 14px;
            border-radius: 7px;
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        .pc-open-btn:hover { opacity: 0.9; transform: scale(0.97); }

        .pc-updated {
            font-size: 11px;
            color: var(--text3);
        }

        /* ===== STATS ROW ===== */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 22px;
            flex: 1; min-width: 140px;
        }
        .stat-label {
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text3);
            margin-bottom: 8px;
        }
        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
        }
        .stat-value span { color: var(--accent); }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.visible { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 18px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.96) translateY(8px);
            transition: transform 0.2s;
        }
        .modal-overlay.visible .modal { transform: scale(1) translateY(0); }

        .modal h3 {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
        }
        .modal p {
            font-size: 13px;
            color: var(--text3);
            margin-bottom: 24px;
        }

        .modal-input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .modal-input:focus { border-color: var(--accent); }
        .modal-input::placeholder { color: var(--text3); }

        .modal-actions {
            display: flex; gap: 10px; justify-content: flex-end;
        }

        .btn-modal-cancel {
            padding: 10px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 9px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-modal-cancel:hover { background: var(--surface2); color: var(--text); }

        .btn-modal-create {
            padding: 10px 20px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 9px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn-modal-create:hover { opacity: 0.9; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            z-index: 999;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg);
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ===== THEME TOGGLE ICON ===== */
        .theme-icon-dark { display: block; }
        .theme-icon-light { display: none; }
        body.light-mode .theme-icon-dark { display: none; }
        body.light-mode .theme-icon-light { display: block; }

        /* ===== SECTION TITLE ===== */
        .section-title-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text3);
        }
        .project-count {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--text3);
            background: var(--surface);
            padding: 3px 10px;
            border-radius: 100px;
            border: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            .dash-body { padding: 24px 16px; }
            .stats-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="dash-header">
    <a href="index.html" class="header-brand">
        <!-- FIX #10: Logo system — uses logo.svg, falls back to icon -->
        <img src="assets/logo/logo.svg" alt="Kexo AI" style="width:34px;height:34px;object-fit:contain"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="brand-icon" style="display:none">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        </div>
        <span class="brand-name">kexo <em>AI</em></span>
    </a>
    <div class="header-sep"></div>
    <span class="header-page">Dashboard</span>

    <div class="header-right">
        <!-- Theme Toggle -->
        <button class="btn-icon" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">
            <svg class="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <a href="index.html" class="btn-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Home
        </a>
    </div>
</header>

<!-- BODY -->
<div class="dash-body">

    <!-- Top Bar -->
    <div class="dash-topbar">
        <div class="dash-topbar-left">
            <h1>My Projects</h1>
            <p>Create and manage your thinking canvases</p>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
            <!-- FIX #8: Import Project button -->
            <button class="btn-import" onclick="document.getElementById('importFileInput').click()" title="Import a project from JSON file">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 5 17 10"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
                Import Project
            </button>
            <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importProject(this)">
            <button class="btn-new" onclick="openNewModal()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Project
            </button>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
        <div class="stat-card">
            <div class="stat-label">Total Projects</div>
            <div class="stat-value" id="statProjects">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Nodes</div>
            <div class="stat-value" id="statNodes">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Connections</div>
            <div class="stat-value" id="statConns">0</div>
        </div>
    </div>

    <!-- Search -->
    <div class="dash-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search projects…" oninput="renderProjects()" />
    </div>

    <!-- Projects Section -->
    <div class="section-title-row">
        <span class="section-title">Your Canvases</span>
        <span class="project-count" id="projectCount">0 projects</span>
    </div>

    <!-- Grid -->
    <div id="projectsGrid"></div>

</div>

<!-- CREATE MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>New Project</h3>
        <p>Give your thinking canvas a name to get started.</p>
        <input type="text" class="modal-input" id="projectNameInput"
               placeholder="e.g. Machine Learning Notes, Q4 Strategy…"
               maxlength="60"
               onkeydown="if(event.key==='Enter') createProject()" />
        <div class="modal-actions">
            <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-modal-create" onclick="createProject()">
                Create Project →
            </button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
'use strict';

// ===== THEME =====
function applyTheme() {
    const theme = localStorage.getItem('kexo_theme') || 'dark';
    document.body.classList.toggle('light-mode', theme === 'light');
}
function toggleTheme() {
    const isLight = document.body.classList.contains('light-mode');
    const newTheme = isLight ? 'dark' : 'light';
    localStorage.setItem('kexo_theme', newTheme);
    document.body.classList.toggle('light-mode', !isLight);
    showToast(newTheme === 'light' ? '☀️ Light mode on' : '🌙 Dark mode on');
}
applyTheme();

// ===== PROJECTS =====
function getProjects() {
    try { return JSON.parse(localStorage.getItem('kexo_projects') || '[]'); }
    catch(e) { return []; }
}
function saveProjects(projects) {
    localStorage.setItem('kexo_projects', JSON.stringify(projects));
}

function generateId() {
    return 'proj_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
}

function getProjectNodeCount(projectId) {
    try {
        const nodes = JSON.parse(localStorage.getItem('kexo_nodes_' + projectId) || '{}');
        return Object.keys(nodes).length;
    } catch(e) { return 0; }
}
function getProjectConnCount(projectId) {
    try {
        const conns = JSON.parse(localStorage.getItem('kexo_connections_' + projectId) || '[]');
        return conns.length;
    } catch(e) { return 0; }
}

function formatDate(ts) {
    if (!ts) return 'Unknown';
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getInitial(name) {
    return (name || 'P').charAt(0).toUpperCase();
}

// ===== RENDER =====
function renderProjects() {
    const projects = getProjects();
    const search = (document.getElementById('searchInput').value || '').toLowerCase();
    const filtered = search
        ? projects.filter(p => p.name.toLowerCase().includes(search))
        : projects;

    // Update stats
    let totalNodes = 0, totalConns = 0;
    projects.forEach(p => {
        totalNodes += getProjectNodeCount(p.id);
        totalConns += getProjectConnCount(p.id);
    });
    document.getElementById('statProjects').textContent = projects.length;
    document.getElementById('statNodes').textContent = totalNodes;
    document.getElementById('statConns').textContent = totalConns;
    document.getElementById('projectCount').textContent = filtered.length + ' project' + (filtered.length !== 1 ? 's' : '');

    const grid = document.getElementById('projectsGrid');

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="4"/><path d="M12 8v8M8 12h8"/></svg>
                </div>
                <h3>${search ? 'No projects found' : 'No projects yet'}</h3>
                <p>${search ? 'Try a different search term.' : 'Create your first thinking canvas to get started.'}</p>
                ${!search ? '<button class="btn-new" onclick="openNewModal()" style="margin:0 auto; display:inline-flex;">+ New Project</button>' : ''}
            </div>`;
        return;
    }

    grid.innerHTML = `<div class="projects-grid">${filtered.map(p => renderCard(p)).join('')}</div>`;
}

function renderCard(p) {
    const nodeCount = getProjectNodeCount(p.id);
    const connCount = getProjectConnCount(p.id);
    return `
        <div class="project-card" ondblclick="openProject('${p.id}')">
            <div class="pc-top">
                <div class="pc-icon">${getInitial(p.name)}</div>
                <div class="pc-actions">
                    <button class="pc-btn" onclick="renameProject('${p.id}', event)" title="Rename">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="pc-btn danger" onclick="deleteProject('${p.id}', event)" title="Delete">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                    </button>
                </div>
            </div>
            <div class="pc-name">${escHtml(p.name)}</div>
            <div class="pc-meta">
                <span class="pc-meta-item">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="4"/></svg>
                    ${nodeCount} node${nodeCount !== 1 ? 's' : ''}
                </span>
                <span class="pc-meta-item">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    ${connCount} link${connCount !== 1 ? 's' : ''}
                </span>
            </div>
            <div class="pc-bottom">
                <button class="pc-open-btn" onclick="openProject('${p.id}')">
                    Open Canvas
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
                <span class="pc-updated">Updated ${formatDate(p.updatedAt)}</span>
            </div>
        </div>`;
}

// ===== ACTIONS =====
function openProject(id) {
    localStorage.setItem('kexo_active_project', id);
    window.location.href = 'workspace.html?project=' + id;
}

function deleteProject(id, e) {
    e && e.stopPropagation();
    const projects = getProjects();
    const p = projects.find(x => x.id === id);
    if (!p) return;
    if (!confirm(`Delete "${p.name}"? This will remove all nodes and cannot be undone.`)) return;
    // Clean up storage
    localStorage.removeItem('kexo_nodes_' + id);
    localStorage.removeItem('kexo_connections_' + id);
    localStorage.removeItem('kexo_notes_' + id);
    localStorage.removeItem('kexo_nextNodeId_' + id);
    localStorage.removeItem('kexo_nextConnId_' + id);
    saveProjects(projects.filter(x => x.id !== id));
    renderProjects();
    showToast('Project deleted');
}

function renameProject(id, e) {
    e && e.stopPropagation();
    const projects = getProjects();
    const p = projects.find(x => x.id === id);
    if (!p) return;
    const newName = prompt('Rename project:', p.name);
    if (!newName || !newName.trim()) return;
    p.name = newName.trim();
    p.updatedAt = Date.now();
    saveProjects(projects);
    renderProjects();
    showToast('Project renamed');
}

// ===== MODAL =====
function openNewModal() {
    document.getElementById('modalOverlay').classList.add('visible');
    setTimeout(() => document.getElementById('projectNameInput').focus(), 150);
    document.getElementById('projectNameInput').value = '';
}
function closeModal() {
    document.getElementById('modalOverlay').classList.remove('visible');
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

function createProject() {
    const name = document.getElementById('projectNameInput').value.trim();
    if (!name) { showToast('Please enter a project name'); return; }
    const projects = getProjects();
    const newProject = {
        id: generateId(),
        name: name,
        createdAt: Date.now(),
        updatedAt: Date.now()
    };
    projects.unshift(newProject);
    saveProjects(projects);
    closeModal();
    showToast('Project created!');

    // Navigate to app with this project
    setTimeout(() => openProject(newProject.id), 300);
}

// ===== HELPERS =====
// ===== FIX #8: IMPORT PROJECT =====
function importProject(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);

            // Validate it's a kexo export
            if (!data.nodes || !data.connections) {
                showToast('Invalid project file — not a kexo export'); return;
            }

            // Generate a fresh project ID to avoid collisions
            const newId = generateId();
            const projectName = (data.project && data.project.name)
                ? data.project.name + ' (imported)'
                : file.name.replace('.json','').replace('kexo-project-','');

            // Save project metadata
            const projects = getProjects();
            projects.unshift({
                id: newId,
                name: projectName,
                createdAt: Date.now(),
                updatedAt: Date.now()
            });
            saveProjects(projects);

            // Save all canvas data under new project ID
            const prefix = 'kexo_';
            localStorage.setItem(prefix + 'nodes_'       + newId, JSON.stringify(data.nodes       || {}));
            localStorage.setItem(prefix + 'connections_'  + newId, JSON.stringify(data.connections || []));
            localStorage.setItem(prefix + 'nextNodeId_'   + newId, data.nextNodeId || '1');
            localStorage.setItem(prefix + 'nextConnId_'   + newId, data.nextConnId  || '1');
            localStorage.setItem(prefix + 'notes_'        + newId, data.notes       || '');
            if (data.drawing) {
                try { localStorage.setItem(prefix + 'drawing_' + newId, data.drawing); } catch(e) {}
            }

            renderProjects();
            showToast(`"${projectName}" imported successfully!`);

            // Ask if they want to open it
            setTimeout(() => {
                if (confirm(`Project "${projectName}" imported!\n\nOpen it now?`)) openProject(newId);
            }, 400);

        } catch(err) {
            showToast('Import failed: ' + err.message);
        }
    };
    reader.readAsText(file);
    input.value = '';
}

function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== INIT =====
renderProjects();

// Keyboard shortcut: N to open new modal
document.addEventListener('keydown', e => {
    if (e.key === 'n' && !e.target.closest('input,textarea,[contenteditable]') && !e.ctrlKey && !e.metaKey) {
        openNewModal();
    }
    if (e.key === 'Escape') closeModal();
});
</script>
